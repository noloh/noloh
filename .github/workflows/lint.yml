name: Lint

on:
  pull_request:
    paths:
      - "**.js"

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Get changed JS files
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACM origin/${{ github.base_ref }}...HEAD | grep '\.js$' | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Register ESLint problem matcher
        run: echo "::add-matcher::.github/eslint-matcher.json"

      - name: Run ESLint on changed files
        if: steps.changed.outputs.files != ''
        run: npm run lint -- ${{ steps.changed.outputs.files }}
